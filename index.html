<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist Skins App</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 3rem;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #ccc;
      font-size: 14px;
    }

    .controls {
      max-width: 560px;
      margin: 0 auto 28px;
    }

    .controls p {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
    }

    .controls input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #000;
      color: #fff;
      font-size: 16px;
    }

    .controls button {
      margin-top: 14px;
      padding: 12px 26px;
      border: 0;
      border-radius: 10px;
      background: #ffcc00;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .controls .hint {
      margin-top: 10px;
      color: #ccc;
      font-size: 13px;
    }

    #skin-container {
      position: relative;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    #boombox {
      display: block;
      width: 100%;
      height: auto;
    }

    #spotify-player-wrap {
      position: absolute;
      top: 5.4%;
      left: 12.4%;
      width: 64.8%;
      height: 8.2%;
      overflow: hidden;
      border-radius: 8px;
      background: transparent;
      display: none;
    }

    #spotify-player {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .error {
      margin-top: 12px;
      color: #ff7777;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1>Playlist Skins App</h1>
  <p class="subtitle">Add this app to your device and bring back Rock 101.</p>

  <div class="controls">
    <p>Paste your Spotify playlist link:</p>
    <input
      type="text"
      id="playlist-url"
      placeholder="https://open.spotify.com/playlist/..."
    />
    <button id="playlist-btn" type="button">Load Playlist</button>
    <div class="hint">Use a full Spotify playlist link.</div>
    <div class="error" id="error-msg"></div>
  </div>

  <div id="skin-container">
    <img id="boombox" src="Boom Box (1).png" alt="Boombox skin" />
    <div id="spotify-player-wrap">
      <iframe
        id="spotify-player"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>
    </div>
  </div>

  <script>
    const playlistInput = document.getElementById("playlist-url");
    const playlistBtn = document.getElementById("playlist-btn");
    const spotifyPlayer = document.getElementById("spotify-player");
    const spotifyWrap = document.getElementById("spotify-player-wrap");
    const errorMsg = document.getElementById("error-msg");
    const boombox = document.getElementById("boombox");

    boombox.addEventListener("error", function () {
      errorMsg.textContent = 'Image not found. Make sure "Boom Box (1).png" is in the same folder as index.html.';
    });

    function getSpotifyEmbedUrl(url) {
      const match = url.match(/spotify\.com\/playlist\/([a-zA-Z0-9]+)/);
      if (!match) return null;
      return "https://open.spotify.com/embed/playlist/" + match[1] + "?utm_source=generator&theme=0";
    }

    playlistBtn.addEventListener("click", function () {
      errorMsg.textContent = "";
      const url = playlistInput.value.trim();
      if (!url) {
        errorMsg.textContent = "Paste a Spotify playlist link first.";
        return;
      }

      const embedUrl = getSpotifyEmbedUrl(url);
      if (!embedUrl) {
        errorMsg.textContent = "That does not look like a valid Spotify playlist link.";
        return;
      }

      spotifyPlayer.src = embedUrl;
      spotifyWrap.style.display = "block";
    });
  </script>
</body>
</html>
