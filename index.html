<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist Skins App</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 4px;
    }

    p.subtitle {
      margin-top: 0;
      margin-bottom: 20px;
      color: #ccc;
      font-size: 14px;
    }

    #install-banner {
      display: none;
      background: #111;
      padding: 15px;
      border: 1px solid #555;
      border-radius: 8px;
      margin: 15px auto 25px;
      max-width: 400px;
    }

    #install-banner button {
      background: #ffc600;
      border: none;
      padding: 10px 18px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      color: #000;
    }

    #playlist-input {
      margin: 0 auto 25px;
      max-width: 480px;
      text-align: center;
      font-size: 14px;
    }

    #playlist-input input {
      width: 100%;
      max-width: 420px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #555;
      background: #000;
      color: #fff;
      box-sizing: border-box;
    }

    #playlist-input button {
      margin-top: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #ffc600;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    #skin-container {
      position: relative;
      max-width: 600px;
      margin: 10px auto;
      overflow: hidden;
    }

    #boombox {
      display: block;
      width: 100%;
      max-width: 600px;
      height: auto;
      margin-top: -40px;
    }

    /* Spotify player positioned over boombox */
    #spotify-player-wrap {
      position: absolute;
      top: 120px;
      left: 76px;
      width: 448px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      background: transparent;
    }

    #spotify-player {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
    }

    .note {
      color: #aaa;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Playlist Skins App</h1>
  <p class="subtitle">Add this app to your device and bring back Rock 101.</p>

  <div id="install-banner">
    <p>Install Playlist Skins App?</p>
    <button id="installButton">Install</button>
  </div>

  <div id="playlist-input">
    <p>Paste your Spotify playlist link:</p>
    <input
      type="text"
      id="playlist-url"
      placeholder="https://open.spotify.com/playlist/..."
    />
    <br />
    <button type="button" id="playlist-btn">Load Playlist</button>
    <div class="note">Use a full Spotify playlist link.</div>
  </div>

  <div id="skin-container">
    <img id="boombox" src="assets/images/boombox.png" alt="Bring Back Rock 101 Boom Box" />

    <div id="spotify-player-wrap">
      <iframe
        id="spotify-player"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>
    </div>
  </div>

  <script src="install-prompt.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(err => {
          console.log("SW registration failed:", err);
        });
      });
    }

    const playlistInput = document.getElementById("playlist-url");
    const playlistBtn = document.getElementById("playlist-btn");
    const spotifyPlayer = document.getElementById("spotify-player");

    function getSpotifyEmbedUrl(url) {
      try {
        const cleanUrl = url.trim();
        const match = cleanUrl.match(/spotify\.com\/playlist\/([a-zA-Z0-9]+)/);
        if (!match) return null;
        const playlistId = match[1];
        return `https://open.spotify.com/embed/playlist/${playlistId}?utm_source=generator`;
      } catch (e) {
        return null;
      }
    }

    if (playlistInput && playlistBtn && spotifyPlayer) {
      playlistBtn.addEventListener("click", function () {
        const url = playlistInput.value.trim();
        if (!url) return;

        const embedUrl = getSpotifyEmbedUrl(url);

        if (!embedUrl) {
          alert("That doesn't look like a valid Spotify playlist link.");
          return;
        }

        spotifyPlayer.src = embedUrl;
        spotifyPlayer.style.display = "block";
      });
    }
  </script>
</body>
</html>
